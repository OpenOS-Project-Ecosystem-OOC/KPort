name: Resolve CI Failures

on:
  schedule:
    - cron: "30 7 * * *" # Daily at 07:30 UTC — full sweep regardless of notifications
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — detect failures without applying fixes"
        type: boolean
        required: false
        default: false
      scan_owners:
        description: "Space-separated orgs to scan (blank = all three)"
        required: false
        default: ""
  # Note: notify-poller.yml triggers this via REST workflow_dispatch, not workflow_call.

permissions:
  contents: write

concurrency:
  group: resolve-failures
  cancel-in-progress: false  # Never cancel mid-fix; queue instead

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr primary; secondary burst limit
#   returns HTTP 403/429 with X-RateLimit-Reset. resolve-failures.sh retries
#   up to 3 times, sleeping until the reset epoch before each retry.
# GitHub Models API (SYNC_TOKEN): quota varies by model; gpt-4o-mini is used.
#   HTTP 429 includes Retry-After (seconds). llm_ask() retries up to 3 times.
#   On full quota exhaustion the script skips AI analysis and exits 0 so no
#   false failure notification is generated.
# Concurrency group (cancel-in-progress: false) ensures concurrent triggers
#   queue rather than race, keeping API usage sequential.

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Scan and resolve failures
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          WATCHDOG_REPO: ${{ github.repository }}
          SCAN_OWNERS: >-
            ${{
              inputs.scan_owners != '' && inputs.scan_owners ||
              'Interested-Deving-1896 OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC'
            }}
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "SYNC_TOKEN not configured — skipping CI failure scan."
            exit 0
          fi
          bash scripts/resolve-failures.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
