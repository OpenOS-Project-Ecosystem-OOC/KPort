  libx11-dev:                "~apt:libx11-dev"
  libxcb1-dev:               "~apt:libxcb1-dev"
  libxcb-composite0-dev:     "~apt:libxcb-composite0-dev"
  libxcb-cursor-dev:         "~apt:libxcb-cursor-dev"
  libxcb-damage0-dev:        "~apt:libxcb-damage0-dev"
  libxcb-ewmh-dev:           "~apt:libxcb-ewmh-dev"
  libxcb-glx0-dev:           "~apt:libxcb-glx0-dev"
  libxcb-icccm4-dev:         "~apt:libxcb-icccm4-dev"
  libxcb-image0-dev:         "~apt:libxcb-image0-dev"
  libxcb-keysyms1-dev:       "~apt:libxcb-keysyms1-dev"
  libxcb-present-dev:        "~apt:libxcb-present-dev"
  libxcb-randr0-dev:         "~apt:libxcb-randr0-dev"
