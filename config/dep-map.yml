  libssl-dev:                "~apt:libssl-dev"
  libdbus-1-dev:             "~apt:libdbus-1-dev"
  libsystemd-dev:            "~apt:libsystemd-dev"
  libpipewire-0.3-dev:       "~apt:libpipewire-0.3-dev"
