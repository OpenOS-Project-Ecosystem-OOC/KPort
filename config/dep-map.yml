  libxcb-render0-dev:        "~apt:libxcb-render0-dev"
  libxcb-shape0-dev:         "~apt:libxcb-shape0-dev"
  libxcb-shm0-dev:           "~apt:libxcb-shm0-dev"
  libxcb-sync-dev:           "~apt:libxcb-sync-dev"
  libxcb-util-dev:           "~apt:libxcb-util-dev"
  libxcb-xfixes0-dev:        "~apt:libxcb-xfixes0-dev"
  libxcb-xinerama0-dev:      "~apt:libxcb-xinerama0-dev"
  libxcb-xkb-dev:            "~apt:libxcb-xkb-dev"
  libxi-dev:                 "~apt:libxi-dev"
  libxrender-dev:            "~apt:libxrender-dev"

  # ── Documentation tools (apt) ─────────────────────────────────────────────
  doxygen:                   "~apt:doxygen"
  graphviz:                  "~apt:graphviz"
  # ── Runtime system libs (apt) ─────────────────────────────────────────────
  libb2-dev:                 "~apt:libb2-dev"
  libb2-1:                   "~apt:libb2-1"
  libbz2-1.0:                "~apt:libbz2-1.0"
  liblzma5:                  "~apt:liblzma5"
  liblz4-1:                  "~apt:liblz4-1"
  libzstd1:                  "~apt:libzstd1"
  zlib1g:                    "~apt:zlib1g"
  # ── Ignored (handled implicitly by build system) ──────────────────────────
  debhelper-compat:          "~ignore"
  dh-sequence-kf6:           "~ignore"
  dh-sequence-pkgkde-symbolshelper: "~ignore"
  kde-qdoc-common-dev:       "~ignore"
  pkg-kde-tools-neon:        "~ignore"
  kf6-extra-cmake-modules:   "kf6-extra-cmake-modules"
