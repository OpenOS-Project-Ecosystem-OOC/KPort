  kpim6-libkleo:                 "https://download.kde.org/stable/release-service/26.04.1/src/libkleo-26.04.1.tar.xz"
  kpim6-mailcommon:              "https://download.kde.org/stable/release-service/26.04.1/src/mailcommon-26.04.1.tar.xz"
  kpim6-mailimporter:            "https://download.kde.org/stable/release-service/26.04.1/src/mailimporter-26.04.1.tar.xz"
