# config/source-url-overrides.yml
#
# Manual source URL overrides for packages whose debian/watch file is wrong
# (e.g. copy-paste errors in the Neon packaging repo that point to a different
# package's tarball entirely).
#
# Format:
#   <kport-pkgname>: "<url-template>"
#
# URL templates support the same placeholders as build_source_url:
#   $pkgver        — full version (e.g. 6.26.0)
#   $pkgver_minor  — major.minor (e.g. 6.26)
#   $_pkgname      — KPort package name (e.g. kf6-syntax-highlighting)
#
# The generator checks this file before using the watch-derived URL.
# Entries here take precedence over both the watch file and the category
# fallback pattern.

source_url_overrides:
  # ── Wrong watch file (points to a different package entirely) ─────────────
  # Each of these has a copy-paste error in neon/kf6/*/debian/watch.
  kf6-syntax-highlighting: "https://download.kde.org/stable/frameworks/$pkgver_minor/syntax-highlighting-$pkgver.tar.xz"
  kf6-sonnet:              "https://download.kde.org/stable/frameworks/$pkgver_minor/sonnet-$pkgver.tar.xz"
  kf6-kcalendarcore:       "https://download.kde.org/stable/frameworks/$pkgver_minor/kcalendarcore-$pkgver.tar.xz"
  kf6-qqc2-desktop-style:  "https://download.kde.org/stable/frameworks/$pkgver_minor/qqc2-desktop-style-$pkgver.tar.xz"
  kf6-oxygen-icon-theme:   "https://download.kde.org/stable/oxygen-icons/oxygen-icons-$pkgver.tar.xz"
  # ktextaddons watch points to kservice — version comes from wrong changelog.
  # Pin to the version Neon unstable currently ships.
  kf6-ktextaddons:         "https://download.kde.org/stable/ktextaddons/ktextaddons-2.0.1.tar.xz"
  libpolkit-qt6-1-1:       "https://download.kde.org/stable/polkit-qt-1/polkit-qt-1-$pkgver.tar.xz"

  # ── Plasma-path packages (moved from KF release path to Plasma) ───────────
  # These packages are now released as part of Plasma, not KDE Frameworks.
  # Their Neon changelog version is "0.0" (placeholder), so $pkgver cannot be
  # used.  URLs are pinned to the Plasma release that Neon unstable tracks.
  # Update these when Neon bumps the Plasma version.
  kf6-kactivities:         "https://download.kde.org/stable/plasma/6.6.5/plasma-activities-6.6.5.tar.xz"
  kf6-kactivities-stats:   "https://download.kde.org/stable/plasma/6.6.5/plasma-activities-stats-6.6.5.tar.xz"
  kf6-kwayland:            "https://download.kde.org/stable/plasma/6.6.5/kwayland-6.6.5.tar.xz"
  kf6-plasma-framework:    "https://download.kde.org/stable/plasma/6.6.5/libplasma-6.6.5.tar.xz"

  # ── Plasma packages with broken/unstable Neon changelog version ───────────
  # plasma-workspace and plasma-desktop are at 6.6.80 (CI bump for a broken
  # state) in Neon/unstable.  Pin to the last stable Plasma release.
  plasma-workspace:        "https://download.kde.org/stable/plasma/6.6.5/plasma-workspace-6.6.5.tar.xz"
  plasma-desktop:          "https://download.kde.org/stable/plasma/6.6.5/plasma-desktop-6.6.5.tar.xz"

  # ── Plasma packages whose Debian binary name differs from upstream tarball ─
  # The generator derives the tarball name from the Debian source package name,
  # but these packages are split from a differently-named upstream tarball.
  breeze-gtk-theme:                  "https://download.kde.org/stable/plasma/6.6.5/breeze-gtk-6.6.5.tar.xz"
  kde-config-gtk-style:              "https://download.kde.org/stable/plasma/6.6.5/kde-gtk-config-6.6.5.tar.xz"
  kde-config-plymouth:               "https://download.kde.org/stable/plasma/6.6.5/breeze-plymouth-6.6.5.tar.xz"
  kwin-wayland:                      "https://download.kde.org/stable/plasma/6.6.5/kwin-6.6.5.tar.xz"
  libkf6screen8:                     "https://download.kde.org/stable/plasma/6.6.5/libkscreen-6.6.5.tar.xz"
  libpam-kwallet5:                   "https://download.kde.org/stable/plasma/6.6.5/kwallet-pam-6.6.5.tar.xz"
  libpowerdevilcore2:                "https://download.kde.org/stable/plasma/6.6.5/powerdevil-6.6.5.tar.xz"
  plymouth-theme-breeze:             "https://download.kde.org/stable/plasma/6.6.5/breeze-plymouth-6.6.5.tar.xz"
  qml6-module-org-kde-qqc2breezestyle: "https://download.kde.org/stable/plasma/6.6.5/qqc2-breeze-style-6.6.5.tar.xz"
  plasma-wayland-protocols:          "https://download.kde.org/stable/plasma-wayland-protocols/plasma-wayland-protocols-1.21.0.tar.xz"

  # ── KDE Gear 26.04.1 — packages whose Debian binary name differs from tarball ─
  kde-config-cddb:               "https://download.kde.org/stable/release-service/26.04.1/src/audiocd-kio-26.04.1.tar.xz"
  kio-audiocd:                   "https://download.kde.org/stable/release-service/26.04.1/src/audiocd-kio-26.04.1.tar.xz"
  kpim6-accountwizard:           "https://download.kde.org/stable/release-service/26.04.1/src/akonadi-import-wizard-26.04.1.tar.xz"
  kpim6-akonadi-calendar-tools:  "https://download.kde.org/stable/release-service/26.04.1/src/akonadi-calendar-tools-26.04.1.tar.xz"
  kpim6-akonadi-contacts:        "https://download.kde.org/stable/release-service/26.04.1/src/akonadi-contacts-26.04.1.tar.xz"
