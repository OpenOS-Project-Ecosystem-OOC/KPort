  kpim6-grantleetheme:           "https://download.kde.org/stable/release-service/26.04.1/src/grantleetheme-26.04.1.tar.xz"
  kpim6-incidenceeditor:         "https://download.kde.org/stable/release-service/26.04.1/src/incidenceeditor-26.04.1.tar.xz"
  kpim6-itinerary:               "https://download.kde.org/stable/release-service/26.04.1/src/itinerary-26.04.1.tar.xz"
  kpim6-kcalendarutils:          "https://download.kde.org/stable/release-service/26.04.1/src/kcalutils-26.04.1.tar.xz"
  kpim6-kdepim-runtime:          "https://download.kde.org/stable/release-service/26.04.1/src/kdepim-runtime-26.04.1.tar.xz"
  kpim6-kimap:                   "https://download.kde.org/stable/release-service/26.04.1/src/kimap-26.04.1.tar.xz"
  kpim6-kmailtransport:          "https://download.kde.org/stable/release-service/26.04.1/src/kmailtransport-26.04.1.tar.xz"
  kpim6-kpimtextedit:            "https://download.kde.org/stable/release-service/26.04.1/src/kpimtextedit-26.04.1.tar.xz"
  kpim6-ktnef:                   "https://download.kde.org/stable/release-service/26.04.1/src/ktnef-26.04.1.tar.xz"
